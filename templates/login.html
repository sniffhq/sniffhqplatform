<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SniffHQ Platform — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { border:none; border-radius:16px; box-shadow:0 8px 40px rgba(0,0,0,0.4); }
    .logo { font-size:1.5rem; font-weight:800; color:#1B2D4F; letter-spacing:-0.5px; }
    .logo span { color:#3DBDB5; }
    .btn-primary { background:#1B2D4F; border-color:#1B2D4F; }
    .btn-primary:hover { background:#142240; border-color:#142240; }
    .badge-platform { background:#e0f7f5; color:#1B2D4F; font-size:.7rem;
                      font-weight:700; padding:2px 8px; border-radius:20px;
                      letter-spacing:.5px; vertical-align:middle; }
  </style>
</head>
<body>
  <div style="width:100%;max-width:420px;padding:16px;">
    <div class="card p-4">
      <div class="text-center mb-4">
        <div class="logo mb-1">Sniff<span>HQ</span></div>
        <span class="badge-platform">PLATFORM ADMIN</span>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} py-2 mb-3" role="alert">
            {{ msg }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.85rem;">Email</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold" style="font-size:.85rem;">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">Sign In</button>
      </form>
    </div>
    <p class="text-center mt-3" style="color:#475569;font-size:.8rem;">
      SniffHQ Platform &mdash; Internal Use Only
    </p>
  </div>
</body>
</html>
